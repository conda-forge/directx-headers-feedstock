schema_version: 1

context:
  version: "1.619.4"

package:
  name: directx-headers
  version: ${{ version }}

source:
  url: https://github.com/microsoft/DirectX-Headers/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 427c4c20bdeb06022d706ba24cb14838b62cca4456a6072e826d7ffa706a4b1a

build:
  number: 0
  script:
    interpreter: brush
    content: |
      mkdir -p "${LIBRARY_INC:-$PREFIX/include}"
      cp -R include/directx include/wsl "${LIBRARY_INC:-$PREFIX/include}/"

requirements:
  build:
    - brush
    - uutils-coreutils

tests:
  - package_contents:
      include:
        - directx/d3d12.h
        - directx/d3dx12.h
        - directx/dxcore.h

about:
  homepage: https://github.com/microsoft/DirectX-Headers
  repository: https://github.com/microsoft/DirectX-Headers
  summary: Official Direct3D 12 headers for Windows and Linux
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - baszalmstra
